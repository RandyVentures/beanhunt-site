<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bean Hunt | Reset Password</title>
    <style>
      :root {
        --bg: #fff8e1;
        --card: #ffffff;
        --espresso: #3e2723;
        --caramel: #d4a574;
        --line: #e4d3b6;
        --muted: #6d5a50;
        --ok: #2e7d32;
        --err: #c62828;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 12% 10%, #ffe8c9 0%, transparent 38%),
          radial-gradient(circle at 88% 16%, #f4d2b1 0%, transparent 42%),
          var(--bg);
        color: var(--espresso);
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: min(460px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 16px 32px rgba(62, 39, 35, 0.16);
      }
      h1 {
        margin: 0 0 8px;
        font-family: Georgia, serif;
        font-size: 1.7rem;
      }
      p { margin: 0 0 16px; color: var(--muted); line-height: 1.5; }
      label {
        display: block;
        margin: 10px 0 6px;
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--espresso);
      }
      input {
        width: 100%;
        height: 46px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 1rem;
      }
      button {
        width: 100%;
        height: 46px;
        margin-top: 14px;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(145deg, var(--espresso), #5d3c35);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled { opacity: 0.7; cursor: default; }
      .msg {
        margin-top: 12px;
        font-size: 0.92rem;
        min-height: 20px;
      }
      .ok { color: var(--ok); }
      .err { color: var(--err); }
      .meta { margin-top: 10px; font-size: 0.8rem; color: var(--muted); }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Reset your password</h1>
      <p>Set a new password for your Bean Hunt account.</p>
      <form id="reset-form">
        <label for="password">New password</label>
        <input id="password" type="password" minlength="8" maxlength="128" required />
        <label for="confirm">Confirm password</label>
        <input id="confirm" type="password" minlength="8" maxlength="128" required />
        <button id="submit-btn" type="submit">Update Password</button>
      </form>
      <div id="message" class="msg"></div>
      <div class="meta">After reset, return to the app and sign in.</div>
    </main>
    <script>
      const API_BASE = "https://api.beanhunt.app/v1";
      const form = document.getElementById("reset-form");
      const message = document.getElementById("message");
      const submitBtn = document.getElementById("submit-btn");
      const token = new URLSearchParams(window.location.search).get("token");

      function setMessage(text, kind) {
        message.textContent = text || "";
        message.className = `msg ${kind || ""}`;
      }

      if (!token) {
        form.classList.add("hidden");
        setMessage("This reset link is invalid or missing a token.", "err");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm").value;
        if (password.length < 8) {
          setMessage("Password must be at least 8 characters.", "err");
          return;
        }
        if (password !== confirm) {
          setMessage("Passwords do not match.", "err");
          return;
        }

        submitBtn.disabled = true;
        setMessage("Updating password...", "");

        try {
          const response = await fetch(`${API_BASE}/auth/password-reset/confirm`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password }),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(payload?.detail || "Unable to reset password.");
          }
          setMessage("Password updated. You can now sign in with your new password.", "ok");
          form.classList.add("hidden");
        } catch (error) {
          setMessage(error?.message || "Unable to reset password.", "err");
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
